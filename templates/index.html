<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sentiment Analysis</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            padding-top: 50px;
        }
        .container {
            max-width: 600px;
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        .result {
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
        }
        .Positive { background-color: #d4edda; color: #155724; }
        .Negative { background-color: #f8d7da; color: #721c24; }
        .Neutral  { background-color: #fff3cd; color: #856404; }
    </style>
</head>
<body>
    <div class="container text-center">
        <h1 class="mb-4">AI Sentiment Analysis</h1>
        <form method="POST" action="/analyze">
            <div class="mb-3">
                <textarea name="text" class="form-control" rows="4" placeholder="Enter text here...">{{ request.form.text or "" }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-lg">Analyze</button>
        </form>

        {% if result %}
        <div class="result {{ sentiment }}">
            {{ result }}
        </div>
        {% endif %}
    </div>
</body>
</html>
